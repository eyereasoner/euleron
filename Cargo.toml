[package]
name = "eyeron"
version = "0.1.0"
edition = "2021"
authors = ["Jos De Roo"]
license = "MIT"
description = "A Rust Notation3 reasoner."
repository = "https://github.com/eyereasoner/eyeron"

[lib]
name = "eyeron"
path = "src/lib.rs"

[[bin]]
name = "eyeron"
path = "src/main.rs"

[profile.release]
lto = true
codegen-units = 1
strip = true

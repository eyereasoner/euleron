<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>The Eyeron N3 Playground</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.min.css" />
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f5f7;
        color: #111827;
      }
      .page {
        max-width: 1400px;
        margin: 0 auto;
        padding: calc(1.5rem + env(safe-area-inset-top)) calc(1rem + env(safe-area-inset-right)) calc(2rem + env(safe-area-inset-bottom)) calc(1rem + env(safe-area-inset-left));
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }
      header { text-align: center; }
      header h1 { margin: 0; font-size: 1.9rem; letter-spacing: -0.02em; }
      header p { margin: 0.35rem 0 0; color: #6b7280; }
      header a { color: #2563eb; text-decoration: none; }
      header a:hover { text-decoration: underline; }
      .grid { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 1rem; align-items: start; }
      .card {
        background: #fff;
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 1rem;
        padding: 1rem;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
        overflow: hidden;
      }
      .section-title { margin: 0 0 0.65rem; font-size: 1rem; font-weight: 650; }
      .CodeMirror {
        border: 1px solid #d1d5db;
        border-radius: 0.75rem;
        min-height: 22rem;
        height: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 0.9rem;
      }
      .data-editor .CodeMirror { min-height: 8rem; }
      .output .CodeMirror { background: #fff; }
      .output-header-row { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 0.65rem; }
      .output-header-row .section-title { margin-bottom: 0; }
      .output-tabs { display: inline-flex; flex-wrap: wrap; gap: 0.35rem; align-items: center; }
      button.output-tab {
        min-height: 32px;
        padding: 0.3rem 0.75rem;
        border-radius: 999px;
        background: transparent;
        color: #4b5563;
        box-shadow: none;
        font-size: 0.8rem;
      }
      button.output-tab:hover:not(:disabled) { background: #eef2ff; color: #1d4ed8; }
      button.output-tab.active { background: #2563eb; color: #ffffff; }
      .markdown-output {
        margin: 0.25rem 0 0;
        border-radius: 0.75rem;
        border: 1px solid #d1d5db;
        padding: 1rem;
        background: #ffffff;
        color: #111827;
        font-size: 0.92rem;
        line-height: 1.55;
        min-height: 5rem;
        max-height: 48rem;
        overflow: auto;
      }
      .markdown-output.is-empty { color: #6b7280; }
      .markdown-output h1, .markdown-output h2, .markdown-output h3, .markdown-output h4, .markdown-output h5, .markdown-output h6 { margin: 1rem 0 0.5rem; line-height: 1.25; color: inherit; }
      .markdown-output h1:first-child, .markdown-output h2:first-child, .markdown-output h3:first-child { margin-top: 0; }
      .markdown-output h1 { font-size: 1.45rem; }
      .markdown-output h2 { font-size: 1.2rem; }
      .markdown-output h3 { font-size: 1.05rem; }
      .markdown-output p { margin: 0.6rem 0; }
      .markdown-output ul, .markdown-output ol { margin: 0.55rem 0 0.75rem 1.35rem; padding: 0; }
      .markdown-output li { margin: 0.2rem 0; }
      .markdown-output a { color: #2563eb; text-decoration: none; }
      .markdown-output a:hover { text-decoration: underline; }
      .markdown-output code { border-radius: 0.35rem; padding: 0.1rem 0.25rem; background: #f3f4f6; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 0.88em; }
      .markdown-output pre { overflow: auto; border-radius: 0.65rem; padding: 0.75rem; background: #f9fafb; border: 1px solid #e5e7eb; }
      .markdown-output pre code { padding: 0; background: transparent; }
      .markdown-output blockquote { margin: 0.75rem 0; padding-left: 0.85rem; border-left: 3px solid #d1d5db; color: #4b5563; }
      .markdown-output table { width: 100%; border-collapse: collapse; margin: 0.75rem 0; font-size: 0.88rem; }
      .markdown-output th, .markdown-output td { border: 1px solid #d1d5db; padding: 0.4rem 0.5rem; vertical-align: top; }
      .markdown-output th { background: #f9fafb; font-weight: 600; }
      .markdown-source-hidden { display: none !important; }
      .controls { display: flex; flex-wrap: wrap; align-items: center; gap: 0.7rem; margin-top: 0.8rem; }
      button, select {
        min-height: 42px;
        border-radius: 999px;
        font: inherit;
      }
      button {
        border: 0;
        padding: 0.55rem 1.25rem;
        cursor: pointer;
        background: #2563eb;
        color: #fff;
        font-weight: 600;
        box-shadow: 0 10px 15px rgba(37, 99, 235, 0.22);
      }
      button.secondary { background: #e5e7eb; color: #111827; box-shadow: none; }
      button:disabled { opacity: 0.6; cursor: default; box-shadow: none; }
      select { border: 1px solid #d1d5db; padding: 0.45rem 0.8rem; background: #fff; }
      label.toggle { display: inline-flex; gap: 0.4rem; align-items: center; color: #374151; font-size: 0.9rem; user-select: none; }
      .status { color: #6b7280; font-size: 0.85rem; flex: 1 1 16rem; }
      .example-row { display: flex; flex-wrap: wrap; align-items: center; gap: 0.6rem; margin-bottom: 0.85rem; }
      .example-row label { font-weight: 650; color: #374151; }
      .example-row select { flex: 1 1 18rem; min-width: 14rem; }
      .share-status { flex: 1 1 14rem; }
      .hint { color: #6b7280; font-size: 0.85rem; margin-top: 0.7rem; line-height: 1.45; }
      .hint code { background: #f3f4f6; padding: 0.1rem 0.25rem; border-radius: 0.3rem; }
      .error { color: #b91c1c; }
      .ok { color: #047857; }
      .cm-error-line {
        background: rgba(239, 68, 68, 0.18) !important;
      }
      .CodeMirror-linebackground.cm-error-line {
        background: rgba(239, 68, 68, 0.18) !important;
        box-shadow: inset 3px 0 0 rgba(239, 68, 68, 0.65) !important;
      }
      .cm-error-token {
        outline: 1px solid rgba(220, 38, 38, 0.9);
        background: rgba(239, 68, 68, 0.24);
      }
      button.share-gist[hidden] { display: none; }
      @media (max-width: 900px) {
        .grid { grid-template-columns: 1fr; }
        .CodeMirror { min-height: 22rem; }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>The Eyeron N3 Playground</h1>
        <p>
          Run <a href="https://github.com/eyereasoner/eyeron" target="_blank" rel="noopener noreferrer">eyeron</a>
          in your browser with the same N3-first reasoner core.
        </p>
        <p class="hint">Version <strong id="version">…</strong></p>
      </header>

      <section class="grid">
        <div class="card">
          <div class="example-row">
            <label for="examples">Load example</label>
            <select id="examples" aria-label="Load a bundled example">
              <option value="">Choose an example…</option>
            </select>
          </div>
          <h2 class="section-title">Rules / program</h2>
          <textarea id="input" spellcheck="false"></textarea>
          <div class="data-editor" style="margin-top:0.8rem">
            <h2 class="section-title">Optional data input</h2>
            <textarea id="data" spellcheck="false"></textarea>
          </div>
          <div class="controls">
            <button id="run">Run reasoning</button>
            <button id="example" class="secondary">Reset example</button>
            <button id="copy-share-link" class="secondary" type="button">Copy share link</button>
            <button
              id="create-gist-share"
              class="secondary share-gist"
              type="button"
              hidden
              title="Store an oversized playground state in a secret GitHub Gist and copy a short stateurl= share link."
            >Create Gist share</button>
            <label class="toggle"><input id="proof" type="checkbox" /> proof</label>
            <label class="toggle"><input id="rdf" type="checkbox" /> RDF/TriG</label>
            <select id="rdf-format" title="RDF format used when RDF/TriG mode is enabled">
              <option value="auto">auto RDF format</option>
              <option value="turtle">Turtle</option>
              <option value="trig">TriG</option>
              <option value="ntriples">N-Triples</option>
              <option value="nquads">N-Quads</option>
            </select>
            <span id="share-status" class="status share-status"></span>
            <span id="status" class="status">Loading wasm module…</span>
          </div>
          <p class="hint">
            Build the browser module with <code>wasm-pack build --target web --out-dir pkg</code>, then serve this directory over HTTP.
          </p>
        </div>

        <div class="card output">
          <div class="output-header-row">
            <h2 class="section-title">Output</h2>
            <div class="output-tabs" role="tablist" aria-label="Output view" hidden>
              <button
                id="output-rendered-tab"
                type="button"
                class="output-tab active"
                role="tab"
                aria-selected="true"
                aria-controls="output-rendered"
              >Rendered</button>
              <button
                id="output-source-tab"
                type="button"
                class="output-tab"
                role="tab"
                aria-selected="false"
                aria-controls="output-source"
              >Markdown source</button>
            </div>
          </div>
          <div id="output-rendered" class="markdown-output is-empty" role="tabpanel" aria-labelledby="output-rendered-tab" hidden>(no output yet)</div>
          <div id="output-source" role="tabpanel" aria-labelledby="output-source-tab">
            <textarea id="output" spellcheck="false"></textarea>
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/turtle/turtle.min.js"></script>
    <script type="module">
      const defaultProgram = `@prefix : <http://example.org/#> .\n\n:Socrates a :Man .\n\n{\n  ?x a :Man .\n} => {\n  ?x a :Mortal .\n} .\n`;
      const trigExample = `PREFIX : <http://example.org/#>\n\n:g { :s :p :o }\n`;
      const queryExample = `@prefix log: <http://www.w3.org/2000/10/swap/log#>.\nPREFIX : <http://example.org/#>\n\n{ ?S ?P ?O } log:query { ?S ?P ?O }.\n`;
      const GIST_SHARE_THRESHOLD = 2000;
      const GITHUB_GIST_API_TOKEN_KEY = 'eyeron.playground.github.gistToken.v1';
      const GITHUB_GIST_CREATE_API_URL = 'https://api.github.com/gists';
      let oversizedStateShareUrlForGist = '';

      const bundledExamples = [
        "age.n3",

        "backward.n3",
        "cat-koko.n3",
        "collection.n3",
        "composition-of-injective-functions-is-injective.n3",
        "constructor-theory-becoming.n3",
        "control-system-becoming.n3",

        "deep-taxonomy-100.n3",
        "deep-taxonomy-1000.n3",
        "deep-taxonomy-10000.n3",
        "deep-taxonomy-100000.n3",
        "derived-backward-rule-2.n3",
        "derived-backward-rule.n3",
        "derived-rule.n3",
        "developmental-genetics-becoming.n3",
        "dining-philosophers.n3",

        "knowledge-engineering-alignment-flow.n3",

        "list-iterate.n3",
        "list-map.n3",

        "log-conclusion.n3",
        "log-for-all-in.n3",
        "log-not-includes.n3",
        "log-uri.n3",
        "minimal-skos-alignment.n3",
        "monkey.n3",
        "monoid-identity-uniqueness.n3",
        "patch.n3",
        "pillar.n3",
        "quoted-head-unquote-select.n3",
        "quoted-head-unquote.n3",
        "rdf-list.n3",
        "rdf-message-cold-chain-recall.n3",
        "rdf-message-flow.n3",
        "rdf-message-ldes-incremental.n3",
        "rdf-message-microgrid.n3",
        "rdf-message-window-repair.n3",

        "reordering.n3",

        "whitehead-becoming.n3",
        "witch.n3"
];

      const input = CodeMirror.fromTextArea(document.getElementById('input'), {
        mode: 'turtle',
        theme: 'material-darker',
        lineNumbers: true,
        lineWrapping: true,
        viewportMargin: Infinity,
      });
      const data = CodeMirror.fromTextArea(document.getElementById('data'), {
        mode: 'turtle',
        theme: 'material-darker',
        lineNumbers: true,
        lineWrapping: true,
        viewportMargin: Infinity,
      });
      const output = CodeMirror.fromTextArea(document.getElementById('output'), {
        mode: 'turtle',
        lineNumbers: true,
        lineWrapping: true,
        readOnly: true,
        viewportMargin: Infinity,
      });

      const runButton = document.getElementById('run');
      const exampleButton = document.getElementById('example');
      const exampleSelect = document.getElementById('examples');
      const copyShareLinkButton = document.getElementById('copy-share-link');
      const createGistShareButton = document.getElementById('create-gist-share');
      const proofCheckbox = document.getElementById('proof');
      const rdfCheckbox = document.getElementById('rdf');
      const rdfFormatSelect = document.getElementById('rdf-format');
      const status = document.getElementById('status');
      const shareStatus = document.getElementById('share-status');
      const version = document.getElementById('version');
      const outputRenderedPanel = document.getElementById('output-rendered');
      const outputSourcePanel = document.getElementById('output-source');
      const outputTabs = document.querySelector('.output-tabs');
      const outputRenderedTab = document.getElementById('output-rendered-tab');
      const outputSourceTab = document.getElementById('output-source-tab');

      let outputMarkdownMode = false;
      let outputMarkdownAutoDetect = false;
      let outputView = 'source';
      let eyeronModule = null;
      let currentExample = '';
      let currentExampleText = '';
      runButton.disabled = true;

      function exampleUrl(name) {
        return new URL('examples/' + encodeURIComponent(name), window.location.href).toString();
      }

      function populateExamples() {
        exampleSelect.innerHTML = '<option value="">Choose an example…</option>';
        for (const name of bundledExamples) {
          const option = document.createElement('option');
          option.value = name;
          option.textContent = name;
          exampleSelect.appendChild(option);
        }
      }

      function escapeHtml(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/'/g, '&#39;');
      }

      function isSafeMarkdownHref(href) {
        const value = String(href || '').trim();
        if (!value) return false;
        if (/^(https?:|mailto:)/i.test(value)) return true;
        if (/^(#|\/|\.\/|\.\.\/)/.test(value)) return true;
        return !/^[a-z][a-z0-9+.-]*:/i.test(value);
      }

      function renderInlineMarkdownNoLinks(value) {
        const codeTokens = [];
        let text = String(value == null ? '' : value).replace(/`([^`\n]+)`/g, (_m, code) => {
          const token = String.fromCharCode(0) + 'CODE' + codeTokens.length + String.fromCharCode(0);
          codeTokens.push('<code>' + escapeHtml(code) + '</code>');
          return token;
        });

        text = escapeHtml(text);
        text = text.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/__([^_\n]+)__/g, '<strong>$1</strong>');
        text = text.replace(/(^|[^*])\*([^*\n]+)\*(?!\*)/g, '$1<em>$2</em>');
        text = text.replace(/(^|[^_])_([^_\n]+)_(?!_)/g, '$1<em>$2</em>');

        for (let i = 0; i < codeTokens.length; i += 1) {
          text = text.split(String.fromCharCode(0) + 'CODE' + i + String.fromCharCode(0)).join(codeTokens[i]);
        }
        return text;
      }

      function renderInlineMarkdown(value) {
        const linkTokens = [];
        let text = String(value == null ? '' : value).replace(/\[([^\]\n]+)\]\(([^)\s]+)(?:\s+"[^"]*")?\)/g, (_m, label, href) => {
          const token = String.fromCharCode(0) + 'LINK' + linkTokens.length + String.fromCharCode(0);
          const cleanHref = String(href || '').trim();
          const htmlLabel = renderInlineMarkdownNoLinks(label);
          linkTokens.push(
            isSafeMarkdownHref(cleanHref)
              ? '<a href="' + escapeAttr(cleanHref) + '" target="_blank" rel="noopener noreferrer">' + htmlLabel + '</a>'
              : htmlLabel,
          );
          return token;
        });

        text = renderInlineMarkdownNoLinks(text);
        for (let i = 0; i < linkTokens.length; i += 1) {
          text = text.split(String.fromCharCode(0) + 'LINK' + i + String.fromCharCode(0)).join(linkTokens[i]);
        }
        return text;
      }

      function splitMarkdownTableRow(line) {
        let value = String(line || '').trim();
        if (value.startsWith('|')) value = value.slice(1);
        if (value.endsWith('|')) value = value.slice(0, -1);
        return value.split('|').map((cell) => cell.trim());
      }

      function isMarkdownTableSeparator(line) {
        const cells = splitMarkdownTableRow(line);
        return cells.length > 1 && cells.every((cell) => /^:?-{3,}:?$/.test(cell));
      }

      function renderMarkdownTable(lines, start) {
        const header = splitMarkdownTableRow(lines[start]);
        const rows = [];
        let i = start + 2;
        while (i < lines.length && /\|/.test(lines[i] || '') && String(lines[i] || '').trim()) {
          rows.push(splitMarkdownTableRow(lines[i]));
          i += 1;
        }
        const headHtml = header.map((cell) => '<th>' + renderInlineMarkdown(cell) + '</th>').join('');
        const bodyHtml = rows
          .map((row) => '<tr>' + row.map((cell) => '<td>' + renderInlineMarkdown(cell) + '</td>').join('') + '</tr>')
          .join('');
        return {
          html: '<table><thead><tr>' + headHtml + '</tr></thead><tbody>' + bodyHtml + '</tbody></table>',
          next: i,
        };
      }

      function renderMarkdownToHtml(markdown) {
        const source = String(markdown == null ? '' : markdown).replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        if (!source.trim()) return '<p>(no output yet)</p>';

        const lines = source.split('\n');
        const blocks = [];
        let i = 0;

        function paragraphFrom(start) {
          const parts = [];
          let j = start;
          while (j < lines.length) {
            const line = lines[j];
            const trimmed = String(line || '').trim();
            if (!trimmed) break;
            if (/^```/.test(trimmed)) break;
            if (/^#{1,6}\s+/.test(trimmed)) break;
            if (/^[-*_]{3,}\s*$/.test(trimmed)) break;
            if (/^\s*([-*+])\s+/.test(line) || /^\s*\d+\.\s+/.test(line)) break;
            if (/^>\s?/.test(line)) break;
            if (/\|/.test(line || '') && j + 1 < lines.length && isMarkdownTableSeparator(lines[j + 1])) break;

            parts.push(renderInlineMarkdown(line.replace(/\s+$/, '')));
            j += 1;
          }
          return { html: '<p>' + parts.join('<br>') + '</p>', next: j };
        }

        while (i < lines.length) {
          const line = lines[i];
          const trimmed = String(line || '').trim();

          if (!trimmed) { i += 1; continue; }

          const fence = trimmed.match(/^```([^`]*)$/);
          if (fence) {
            const code = [];
            i += 1;
            while (i < lines.length && !/^```\s*$/.test(String(lines[i] || '').trim())) {
              code.push(lines[i]);
              i += 1;
            }
            if (i < lines.length) i += 1;
            blocks.push('<pre><code>' + escapeHtml(code.join('\n')) + '</code></pre>');
            continue;
          }

          const heading = trimmed.match(/^(#{1,6})\s+(.*?)\s*#*$/);
          if (heading) {
            const level = heading[1].length;
            blocks.push('<h' + level + '>' + renderInlineMarkdown(heading[2]) + '</h' + level + '>');
            i += 1;
            continue;
          }

          if (/^[-*_]{3,}\s*$/.test(trimmed)) { blocks.push('<hr>'); i += 1; continue; }

          if (/\|/.test(line || '') && i + 1 < lines.length && isMarkdownTableSeparator(lines[i + 1])) {
            const table = renderMarkdownTable(lines, i);
            blocks.push(table.html);
            i = table.next;
            continue;
          }

          if (/^\s*([-*+])\s+/.test(line)) {
            const items = [];
            while (i < lines.length) {
              const m = String(lines[i] || '').match(/^\s*[-*+]\s+(.*)$/);
              if (!m) break;
              items.push('<li>' + renderInlineMarkdown(m[1]) + '</li>');
              i += 1;
            }
            blocks.push('<ul>' + items.join('') + '</ul>');
            continue;
          }

          if (/^\s*\d+\.\s+/.test(line)) {
            const items = [];
            while (i < lines.length) {
              const m = String(lines[i] || '').match(/^\s*\d+\.\s+(.*)$/);
              if (!m) break;
              items.push('<li>' + renderInlineMarkdown(m[1]) + '</li>');
              i += 1;
            }
            blocks.push('<ol>' + items.join('') + '</ol>');
            continue;
          }

          if (/^>\s?/.test(line)) {
            const quoted = [];
            while (i < lines.length && /^>\s?/.test(String(lines[i] || ''))) {
              quoted.push(String(lines[i] || '').replace(/^>\s?/, ''));
              i += 1;
            }
            blocks.push('<blockquote>' + renderMarkdownToHtml(quoted.join('\n')) + '</blockquote>');
            continue;
          }

          const paragraph = paragraphFrom(i);
          blocks.push(paragraph.html);
          i = paragraph.next > i ? paragraph.next : i + 1;
        }

        return blocks.join('\n');
      }

      function isLikelyTurtleOutput(value) {
        const text = String(value == null ? '' : value).trim();
        if (!text) return false;
        if (/^@prefix\s+[^\s]+\s+<[^>]+>\s*\./im.test(text)) return true;
        if (/^prefix\s+[^\s]+\s+<[^>]+>\s*$/im.test(text)) return true;
        const lines = text.split(/\r\n|\n|\r/).map((line) => line.trim()).filter(Boolean);
        let tripleLike = 0;
        const turtleSubject = '(?:<[^>]+>|_:[A-Za-z][\\w-]*|:[^\\s]+|[A-Za-z_][\\w.-]*:[^\\s]*)';
        const turtlePredicate = '(?:a|=|<[^>]+>|:[^\\s]+|[A-Za-z_][\\w.-]*:[^\\s]+)';
        const turtleObject = "(?:<[^>]+>|_:[A-Za-z][\\w-]*|:[^\\s]+|[A-Za-z_][\\w.-]*:[^\\s]+|[\"']|[-+]?(?:\\d+(?:\\.\\d*)?|\\.\\d+)(?:[eE][-+]?\\d+)?|true|false|\\(|\\[|\\{)";
        const turtleTripleStart = new RegExp('^' + turtleSubject + '\\s+' + turtlePredicate + '\\s+' + turtleObject + '(?:\\s|[.;,]|$)');
        for (const line of lines) {
          if (!line || line.startsWith('#') || !/\.\s*$/.test(line)) continue;
          if (turtleTripleStart.test(line)) tripleLike += 1;
        }
        return tripleLike > 0;
      }

      function isLikelyMarkdownOutput(value) {
        const text = String(value == null ? '' : value).trim();
        if (!text || text === '(no output yet)' || isLikelyTurtleOutput(text)) return false;
        if (/^#{1,6}\s+\S/m.test(text)) return true;
        if (/^```/m.test(text)) return true;
        if (/^>\s+\S/m.test(text)) return true;
        if (/^\s*[-*+]\s+\S/m.test(text)) return true;
        if (/^\s*\d+\.\s+\S/m.test(text)) return true;
        if (/\[[^\]\n]+\]\((?:https?:|mailto:|#|\/|\.\/|\.\.\/)[^)]+\)/i.test(text)) return true;
        if (/\*\*[^*\n]+\*\*/.test(text) || /__[^_\n]+__/.test(text)) return true;
        if (/\|/.test(text)) {
          const lines = text.split(/\r\n|\n|\r/);
          for (let i = 0; i + 1 < lines.length; i += 1) {
            if (/\|/.test(lines[i]) && isMarkdownTableSeparator(lines[i + 1])) return true;
          }
        }
        return false;
      }

      function syncRenderedOutput() {
        if (!outputRenderedPanel) return;
        const value = output.getValue();
        outputRenderedPanel.innerHTML = renderMarkdownToHtml(value);
        outputRenderedPanel.classList.toggle('is-empty', !String(value || '').trim() || String(value).trim() === '(no output yet)');
      }

      function setOutputMarkdownMode(enabled) {
        outputMarkdownMode = !!enabled;
        if (outputTabs) outputTabs.hidden = !outputMarkdownMode;
      }

      function setOutputView(nextView) {
        outputView = outputMarkdownMode && nextView !== 'source' ? 'rendered' : 'source';
        const showRendered = outputMarkdownMode && outputView === 'rendered';
        if (outputRenderedPanel) outputRenderedPanel.hidden = !showRendered;
        if (outputSourcePanel) outputSourcePanel.classList.toggle('markdown-source-hidden', showRendered);
        if (outputRenderedTab) {
          outputRenderedTab.classList.toggle('active', showRendered);
          outputRenderedTab.setAttribute('aria-selected', showRendered ? 'true' : 'false');
        }
        if (outputSourceTab) {
          outputSourceTab.classList.toggle('active', outputMarkdownMode && !showRendered);
          outputSourceTab.setAttribute('aria-selected', outputMarkdownMode && !showRendered ? 'true' : 'false');
        }
        if (showRendered) syncRenderedOutput();
        else if (output && typeof output.refresh === 'function') output.refresh();
      }

      function setOutputText(text, preferredView = 'auto') {
        outputMarkdownAutoDetect = preferredView === 'auto';
        output.setValue(String(text == null ? '' : text));
        syncRenderedOutput();
        if (outputMarkdownAutoDetect) {
          const markdownMode = isLikelyMarkdownOutput(output.getValue());
          setOutputMarkdownMode(markdownMode);
          setOutputView(markdownMode ? 'rendered' : 'source');
        } else {
          const markdownMode = preferredView !== 'source';
          setOutputMarkdownMode(markdownMode);
          setOutputView(markdownMode && preferredView !== 'source' ? 'rendered' : 'source');
        }
      }

      function setStatus(message, className = 'status') {
        status.textContent = message;
        status.className = className;
      }

      function setShareStatus(message, className = 'status share-status') {
        shareStatus.textContent = message;
        shareStatus.className = className;
      }

      const errorHighlights = [];

      function clearErrorHighlight() {
        while (errorHighlights.length) {
          const item = errorHighlights.pop();
          if (item.lineHandle) item.editor.removeLineClass(item.lineHandle, 'background', 'cm-error-line');
          if (item.mark) item.mark.clear();
        }
      }

      function highlightEditorError(editor, line1, column1) {
        clearErrorHighlight();
        const line = Number.isFinite(line1) ? Math.max(0, line1 - 1) : 0;
        const ch = Number.isFinite(column1) ? Math.max(0, column1 - 1) : 0;
        if (line < 0 || line >= editor.lineCount()) return;
        const lineHandle = editor.getLineHandle(line);
        editor.addLineClass(lineHandle, 'background', 'cm-error-line');
        const lineText = editor.getLine(line) || '';
        const to = { line, ch: Math.min(lineText.length, ch + 1) };
        const mark = editor.markText({ line, ch: Math.min(lineText.length, ch) }, to, { className: 'cm-error-token' });
        errorHighlights.push({ editor, lineHandle, mark });
        editor.scrollIntoView({ line, ch }, 90);
        editor.setCursor({ line, ch });
        editor.focus();
      }

      function showReasoningError(report) {
        const err = report && report.error ? report.error : {};
        setOutputText(String(err.display || err.message || 'Unknown error'), 'source');
        const editor = err.editor === 'data' ? data : input;
        if (Number.isFinite(err.line) && err.line > 0) {
          highlightEditorError(editor, err.line, Number.isFinite(err.column) ? err.column : 1);
        } else {
          clearErrorHighlight();
        }
      }

      function setExampleMarker(name, text) {
        currentExample = name || '';
        currentExampleText = text || '';
        exampleSelect.value = currentExample;
      }

      async function loadExample(name) {
        if (!name) return;
        setStatus('Loading example…');
        const response = await fetch(exampleUrl(name), { cache: 'no-store' });
        if (!response.ok) throw new Error('Could not load examples/' + name + ' (' + response.status + ')');
        const text = await response.text();
        input.setValue(text);
        data.setValue('');
        setExampleMarker(name, text);
        setStatus('Loaded examples/' + name, 'status ok');
        localStorage.setItem('eyeron.playground.example', name);
        localStorage.setItem('eyeron.playground.input', text);
        localStorage.setItem('eyeron.playground.data', '');
      }

      function bytesToBase64Url(bytes) {
        let binary = '';
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
          binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
        }
        return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
      }

      function base64UrlToBytes(value) {
        const padded = String(value || '').replace(/-/g, '+').replace(/_/g, '/') + '='.repeat((4 - (String(value || '').length % 4)) % 4);
        const binary = atob(padded);
        const bytes = new Uint8Array(binary.length);
        for (let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
        return bytes;
      }

      function encodeUtf8(text) {
        return new TextEncoder().encode(String(text));
      }

      function decodeUtf8(bytes) {
        return new TextDecoder('utf-8').decode(bytes);
      }

      async function gzipText(text) {
        if (!window.CompressionStream || !window.Response || !window.Blob) return null;
        const stream = new Blob([String(text)]).stream().pipeThrough(new CompressionStream('gzip'));
        return new Uint8Array(await new Response(stream).arrayBuffer());
      }

      async function gunzipText(bytes) {
        if (!window.DecompressionStream || !window.Response || !window.Blob) {
          throw new Error('This browser cannot open compressed playground state links.');
        }
        const stream = new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'));
        return new Response(stream).text();
      }

      function base64UrlEncode(text) {
        return bytesToBase64Url(encodeUtf8(text));
      }

      function base64UrlDecode(text) {
        return decodeUtf8(base64UrlToBytes(text));
      }

      function compactPlaygroundState(state) {
        const compact = { v: 1 };
        if (state.proof) compact.p = true;
        if (state.rdf) compact.r = true;
        if (state.format && state.format !== 'auto') compact.f = state.format;
        if (state.example) compact.x = state.example;
        if (typeof state.input === 'string') compact.i = state.input;
        if (typeof state.data === 'string' && state.data) compact.d = state.data;
        return compact;
      }

      async function packPlaygroundState(state) {
        const json = JSON.stringify(compactPlaygroundState(state));
        const jsonToken = 'j.' + base64UrlEncode(json);
        try {
          const gz = await gzipText(json);
          if (gz) {
            const gzipToken = 'g.' + bytesToBase64Url(gz);
            if (gzipToken.length < jsonToken.length) return gzipToken;
          }
        } catch (_) {
          // Fall through to universal JSON payload.
        }
        return jsonToken;
      }

      async function unpackPlaygroundState(token) {
        const value = String(token || '').trim();
        if (!value) return null;
        let json;
        if (value.startsWith('g.')) json = await gunzipText(base64UrlToBytes(value.slice(2)));
        else if (value.startsWith('j.')) json = base64UrlDecode(value.slice(2));
        else json = base64UrlDecode(value);
        return JSON.parse(json);
      }

      function normalizePlaygroundState(raw) {
        if (!raw || typeof raw !== 'object') return null;
        return {
          v: raw.v || 1,
          proof: !!(raw.p ?? raw.proof),
          rdf: !!(raw.r ?? raw.rdf),
          format: String(raw.f ?? raw.format ?? 'auto'),
          example: typeof (raw.x ?? raw.example) === 'string' ? (raw.x ?? raw.example) : '',
          input: typeof (raw.i ?? raw.input) === 'string' ? (raw.i ?? raw.input) : null,
          data: typeof (raw.d ?? raw.data) === 'string' ? (raw.d ?? raw.data) : '',
        };
      }

      function getShareStateTokenFromLocation() {
        const url = new URL(window.location.href);
        return url.searchParams.get('state') || url.searchParams.get('s') || (window.location.hash || '').match(/^#state=([^&]+)/)?.[1] || '';
      }

      function getStateUrlFromLocation() {
        const url = new URL(window.location.href);
        return url.searchParams.get('stateurl') || url.searchParams.get('stateuri') || url.searchParams.get('state-url') || '';
      }

      async function fetchPlaygroundStateFromUrl(stateUrl) {
        const url = String(stateUrl || '').trim();
        if (!url) return null;
        const res = await fetch(url, { cache: 'no-store', redirect: 'follow', referrerPolicy: 'no-referrer' });
        if (!res.ok) throw new Error(`HTTP ${res.status} when fetching shared state.`);
        return JSON.parse(await res.text());
      }

      async function readShareState() {
        try {
          const token = getShareStateTokenFromLocation();
          if (token) return normalizePlaygroundState(await unpackPlaygroundState(token));
          const stateUrl = getStateUrlFromLocation();
          if (stateUrl) return normalizePlaygroundState(await fetchPlaygroundStateFromUrl(stateUrl));
        } catch (err) {
          console.warn('Ignoring invalid playground share state', err);
          setShareStatus('Could not open shared state: ' + String(err && err.message ? err.message : err), 'status share-status error');
        }
        return null;
      }

      function currentStateForShare() {
        const program = input.getValue();
        const facts = data.getValue();
        const state = {
          v: 1,
          proof: proofCheckbox.checked,
          rdf: rdfCheckbox.checked,
          format: rdfFormatSelect.value,
        };
        if (currentExample && program === currentExampleText && !facts.trim()) {
          state.example = currentExample;
        } else {
          state.input = program;
          state.data = facts;
        }
        return state;
      }

      async function playgroundShareUrl() {
        const url = new URL(window.location.href);
        if (url.pathname.endsWith('/playground.html')) {
          url.pathname = url.pathname.replace(/playground\.html$/, 'playground');
        }
        for (const name of ['state', 's', 'stateurl', 'stateuri', 'state-url']) url.searchParams.delete(name);
        url.searchParams.set('state', await packPlaygroundState(currentStateForShare()));
        url.hash = '';
        return url.toString();
      }

      function shareUrlHasEmbeddedState(shareUrl) {
        try {
          const url = new URL(String(shareUrl || ''), window.location.href);
          return !!(url.searchParams.get('state') || url.searchParams.get('s') || (url.hash || '').startsWith('#state='));
        } catch (_) {
          return false;
        }
      }

      function shouldOfferGistShare(shareUrl) {
        return String(shareUrl || '').length > GIST_SHARE_THRESHOLD && shareUrlHasEmbeddedState(shareUrl);
      }

      function setShareGistOption(shareUrl) {
        oversizedStateShareUrlForGist = shouldOfferGistShare(shareUrl) ? String(shareUrl) : '';
        if (createGistShareButton) {
          createGistShareButton.hidden = !oversizedStateShareUrlForGist;
          createGistShareButton.disabled = !oversizedStateShareUrlForGist;
        }
      }

      function normalizeGithubGistToken(token) {
        const value = String(token || '').trim();
        return value.replace(/^Bearer\s+/i, '');
      }

      function getGithubGistToken() {
        let token = '';
        try {
          token = localStorage.getItem(GITHUB_GIST_API_TOKEN_KEY) || '';
        } catch (_) {}
        token = normalizeGithubGistToken(token);
        if (token) return token;
        token = normalizeGithubGistToken(window.prompt('GitHub token with gist scope for creating a secret share gist:') || '');
        if (token) {
          try { localStorage.setItem(GITHUB_GIST_API_TOKEN_KEY, token); } catch (_) {}
        }
        return token;
      }

      function rawUrlFromGistApiResponse(payload) {
        if (!payload || typeof payload !== 'object' || !payload.files) return '';
        for (const file of Object.values(payload.files)) {
          if (file && typeof file.raw_url === 'string') return file.raw_url;
        }
        return '';
      }

      function makeShareUrlFromStateUrl(stateUrl) {
        const url = new URL(window.location.href);
        if (url.pathname.endsWith('/playground.html')) {
          url.pathname = url.pathname.replace(/playground\.html$/, 'playground');
        }
        for (const name of ['state', 's', 'stateurl', 'stateuri', 'state-url']) url.searchParams.delete(name);
        url.searchParams.set('stateurl', stateUrl);
        url.hash = '';
        return url.toString();
      }

      async function createGistBackedShareUrl(state, token) {
        if (!token) throw new Error('GitHub Gist token was not provided.');
        const content = JSON.stringify(compactPlaygroundState(state), null, 2) + '\n';
        const res = await fetch(GITHUB_GIST_CREATE_API_URL, {
          method: 'POST',
          headers: {
            Accept: 'application/vnd.github+json',
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify({
            description: 'Eyeron playground shared state',
            public: false,
            files: { 'eyeron-playground-state.json': { content } },
          }),
          cache: 'no-store',
          referrerPolicy: 'no-referrer',
        });
        let payload = null;
        try { payload = await res.json(); } catch (_) {}
        if (!res.ok) {
          const detail = payload && typeof payload === 'object' ? String(payload.message || payload.error || '').trim() : '';
          if (res.status === 401 || res.status === 403) {
            try { localStorage.removeItem(GITHUB_GIST_API_TOKEN_KEY); } catch (_) {}
          }
          throw new Error(detail || `GitHub Gist API returned HTTP ${res.status}.`);
        }
        const rawUrl = rawUrlFromGistApiResponse(payload);
        if (!rawUrl) throw new Error('GitHub Gist API did not return a raw_url.');
        return makeShareUrlFromStateUrl(rawUrl);
      }

      async function copyTextToClipboard(text) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return;
        }
        const temporary = document.createElement('textarea');
        temporary.value = text;
        temporary.setAttribute('readonly', '');
        temporary.style.position = 'fixed';
        temporary.style.left = '-9999px';
        temporary.style.top = '0';
        document.body.appendChild(temporary);
        temporary.focus();
        temporary.select();
        let ok = false;
        try { ok = document.execCommand('copy'); } finally { document.body.removeChild(temporary); }
        if (!ok) throw new Error('Clipboard copy was blocked by the browser.');
      }

      async function copyShareLink() {
        copyShareLinkButton.disabled = true;
        setShareStatus('Creating compact share link…');
        let url = '';
        try {
          url = await playgroundShareUrl();
          setShareGistOption(url);
          await copyTextToClipboard(url);
          setShareStatus(
            shouldOfferGistShare(url)
              ? `Copied compact share link (${url.length} chars). Use Create Gist share for a practical public URL.`
              : 'Share link copied.',
            'status share-status ok',
          );
        } catch (err) {
          try {
            if (!url) url = await playgroundShareUrl();
            setShareGistOption(url);
            setShareStatus(
              shouldOfferGistShare(url)
                ? `Share link is ${url.length} chars; use Create Gist share for a practical public URL.`
                : 'Could not copy automatically; use your browser copy command on this generated link.',
              shouldOfferGistShare(url) ? 'status share-status' : 'status share-status error',
            );
            window.prompt('Copy this compact share link:', url);
          } catch (_) {
            setShareStatus('Could not create a share link.', 'status share-status error');
          }
        } finally {
          copyShareLinkButton.disabled = false;
        }
      }

      async function createGistShare() {
        if (!oversizedStateShareUrlForGist) {
          setShareStatus('Create or copy an oversized playground state link first.');
          return;
        }
        const token = getGithubGistToken();
        if (!token) {
          setShareStatus('GitHub Gist token was not provided; oversized state was not uploaded.', 'status share-status error');
          return;
        }
        createGistShareButton.disabled = true;
        setShareStatus('Creating secret GitHub Gist share…');
        try {
          const gistUrl = await createGistBackedShareUrl(currentStateForShare(), token);
          await copyTextToClipboard(gistUrl);
          oversizedStateShareUrlForGist = '';
          createGistShareButton.hidden = true;
          setShareStatus(`Created Gist-backed share link and copied it (${gistUrl.length} chars).`, 'status share-status ok');
        } catch (err) {
          setShareStatus('GitHub Gist share failed: ' + String(err && err.message ? err.message : err), 'status share-status error');
        } finally {
          createGistShareButton.disabled = !oversizedStateShareUrlForGist;
        }
      }

      async function restoreInitialState() {
        populateExamples();
        const shared = await readShareState();
        if (shared) {
          proofCheckbox.checked = !!shared.proof;
          rdfCheckbox.checked = !!shared.rdf;
          rdfFormatSelect.value = shared.format || 'auto';
          if (shared.example) {
            await loadExample(shared.example);
          } else {
            input.setValue(typeof shared.input === 'string' ? shared.input : defaultProgram);
            data.setValue(typeof shared.data === 'string' ? shared.data : '');
            setExampleMarker('', '');
          }
          setShareStatus('Loaded shared playground state.');
          return;
        }

        const savedInput = localStorage.getItem('eyeron.playground.input');
        const savedData = localStorage.getItem('eyeron.playground.data');
        input.setValue(savedInput || defaultProgram);
        data.setValue(savedData || '');
        proofCheckbox.checked = localStorage.getItem('eyeron.playground.proof') === '1';
        rdfCheckbox.checked = localStorage.getItem('eyeron.playground.rdf') === '1';
        rdfFormatSelect.value = localStorage.getItem('eyeron.playground.rdfFormat') || 'auto';
        const savedExample = localStorage.getItem('eyeron.playground.example') || '';
        if (savedExample && savedInput) {
          setExampleMarker(savedExample, savedInput);
        }
      }

      async function loadEyeron() {
        try {
          const mod = await import('./pkg/eyeron.js');
          await mod.default();
          eyeronModule = mod;
          version.textContent = mod.version ? `v${mod.version()}` : 'loaded';
          setStatus('Ready', 'status ok');
          runButton.disabled = false;
        } catch (err) {
          version.textContent = 'not loaded';
          setStatus('Build the wasm package first: wasm-pack build --target web --out-dir pkg', 'status error');
          setOutputText(String(err && err.message ? err.message : err), 'source');
        }
      }

      async function run() {
        if (!eyeronModule) return;
        localStorage.setItem('eyeron.playground.input', input.getValue());
        localStorage.setItem('eyeron.playground.data', data.getValue());
        localStorage.setItem('eyeron.playground.proof', proofCheckbox.checked ? '1' : '0');
        localStorage.setItem('eyeron.playground.rdf', rdfCheckbox.checked ? '1' : '0');
        localStorage.setItem('eyeron.playground.rdfFormat', rdfFormatSelect.value);
        localStorage.setItem('eyeron.playground.example', currentExample || '');

        runButton.disabled = true;
        setStatus('Running…');
        try {
          await new Promise(requestAnimationFrame);
          clearErrorHighlight();
          const rawReport = eyeronModule.reasonWithDataReport
            ? eyeronModule.reasonWithDataReport(
                input.getValue(),
                data.getValue(),
                proofCheckbox.checked,
                rdfCheckbox.checked,
                rdfFormatSelect.value,
              )
            : JSON.stringify({
                ok: true,
                output: eyeronModule.reasonWithData(
                  input.getValue(),
                  data.getValue(),
                  proofCheckbox.checked,
                  rdfCheckbox.checked,
                  rdfFormatSelect.value,
                ),
              });
          const report = JSON.parse(rawReport);
          if (report.ok) {
            setOutputText(report.output || '', 'auto');
            setStatus('Done', 'status ok');
          } else {
            showReasoningError(report);
            setStatus('Syntax error', 'status error');
          }
        } catch (err) {
          setOutputText(String(err && err.message ? err.message : err), 'source');
          clearErrorHighlight();
          setStatus('Error', 'status error');
        } finally {
          runButton.disabled = false;
        }
      }

      input.on('change', () => {
        clearErrorHighlight();
        if (currentExample && input.getValue() !== currentExampleText) setExampleMarker('', '');
      });
      data.on('change', () => {
        clearErrorHighlight();
        if (data.getValue().trim()) setExampleMarker('', '');
      });

      if (outputRenderedTab) outputRenderedTab.addEventListener('click', () => setOutputView('rendered'));
      if (outputSourceTab) outputSourceTab.addEventListener('click', () => setOutputView('source'));
      output.on('change', () => {
        syncRenderedOutput();
        if (outputMarkdownAutoDetect) {
          const markdownMode = isLikelyMarkdownOutput(output.getValue());
          if (markdownMode !== outputMarkdownMode) {
            setOutputMarkdownMode(markdownMode);
            setOutputView(markdownMode ? 'rendered' : 'source');
          }
        }
      });
      setOutputText('(no output yet)', 'source');

      runButton.addEventListener('click', run);
      copyShareLinkButton.addEventListener('click', copyShareLink);
      createGistShareButton.addEventListener('click', createGistShare);
      exampleSelect.addEventListener('change', async () => {
        try {
          await loadExample(exampleSelect.value);
        } catch (err) {
          setStatus(String(err && err.message ? err.message : err), 'status error');
        }
      });
      exampleButton.addEventListener('click', () => {
        if (rdfCheckbox.checked) {
          data.setValue(trigExample);
          input.setValue(queryExample);
          rdfFormatSelect.value = 'trig';
          setExampleMarker('', '');
        } else {
          data.setValue('');
          input.setValue(defaultProgram);
          setExampleMarker('', '');
        }
      });
      rdfCheckbox.addEventListener('change', () => {
        if (rdfCheckbox.checked && input.getValue().trim() === defaultProgram.trim()) {
          data.setValue(trigExample);
          input.setValue(queryExample);
          rdfFormatSelect.value = 'trig';
          setExampleMarker('', '');
        }
      });

      await restoreInitialState();
      loadEyeron();
    </script>
  </body>
</html>
